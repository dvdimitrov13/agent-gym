# V2 config — NDCG rewards, snippet-ID ranking, length-biased GRPO
# Changes from v1:
#   - loss_type: grpo (not dapo — SID-1 shows DAPO causes OOV collapse)
#   - Rewards: NDCG (1.0) + efficiency (0.5) + format (0.3)
#   - Dropped: thinking, truncation (redundant with NDCG)
#   - Uses SearchEnvironmentV2 (snippet IDs)
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2.jsonl"

# Remote inference server (GPU 0)
inference_server_url: "http://localhost:8000"

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 1024
max_tool_calling_iterations: 3

# GRPO settings — length-biased (SID-1 recommendation)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Training length
num_train_epochs: 4
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

# Optimizations
bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# Filtering
zero_variance_filtering: true

# V2 flags
use_v2_env: true
use_v2_rewards: true

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
