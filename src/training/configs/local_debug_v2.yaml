# Local debug config — v2 rewards, 0.6B model on MPS
model_name: "Qwen/Qwen3-0.6B"
dataset: "data/eval_trl_v2.jsonl"

per_device_train_batch_size: 2
gradient_accumulation_steps: 1
num_generations: 2
max_completion_length: 256
max_tool_calling_iterations: 2

# GRPO settings — length-biased
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Short run
max_steps: 3
logging_steps: 1
save_steps: 100

# No LoRA for debug
use_lora: false

# Optimizations
bf16: false
gradient_checkpointing: false
mask_truncated_completions: false

# V2 flags
use_v2_env: true
use_v2_rewards: true

# Output
output_dir: "checkpoints/debug-v2"
