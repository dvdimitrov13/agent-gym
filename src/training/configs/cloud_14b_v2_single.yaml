# V2 single-GPU config — Blackwell 98GB RTX PRO 6000
# Curriculum: progressive length, tool iterations, and data difficulty
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2.jsonl"

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 256  # starting value, increases via schedule
max_tool_calling_iterations: 3  # starting value, increases via schedule

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

num_train_epochs: 4
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Curriculum scheduling
# Length: 256 → 512 → 1024 (generation budget per round)
length_schedule:
  - [0, 256]
  - [100, 512]
  - [200, 1024]

# Tool iterations: 3 → 6 → 10
tool_iter_schedule:
  - [0, 3]
  - [100, 6]
  - [200, 10]

# Data is pre-sorted: 1-hop first, then 2-hop, then 3-hop

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
