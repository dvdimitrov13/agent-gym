# V2 single-GPU config — Blackwell 98GB
# Pre-built curriculum: 2 sorted epochs + 2 shuffled epochs in one dataset
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2_curriculum.jsonl"

per_device_train_batch_size: 2
gradient_accumulation_steps: 2
num_generations: 4
max_completion_length: 512
max_tool_calling_iterations: 5

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Single epoch (curriculum baked into the dataset)
num_train_epochs: 1
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Curriculum schedule (aligned to pre-sorted data):
# Epochs 1-2 (sorted): 1-hop → 2-hop → 3-hop, twice
#   Steps  0-14:  1-hop, 512 tokens, 5 iters
#   Steps 15-34:  2-hop, 768 tokens, 7 iters
#   Steps 35-49:  3-hop, 1024 tokens, 10 iters
#   Steps 50-64:  1-hop again, 512 tokens, 5 iters
#   Steps 65-84:  2-hop again, 768 tokens, 7 iters
#   Steps 85-99:  3-hop again, 1024 tokens, 10 iters
# Epochs 3-4 (shuffled): all mixed at full budget
#   Steps 100-199: 1024 tokens, 10 iters
length_schedule:
  - [0, 512]
  - [15, 768]
  - [35, 1024]
  - [50, 512]
  - [65, 768]
  - [85, 1024]

tool_iter_schedule:
  - [0, 5]
  - [15, 7]
  - [35, 10]
  - [50, 5]
  - [65, 7]
  - [85, 10]

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
