# V2 single-GPU config — Blackwell 98GB
# Clean setup: no forced submit, no cache, bug-fixed TI/TO
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2.jsonl"

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 512
max_tool_calling_iterations: 5

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

num_train_epochs: 4
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Curriculum scheduling
# Length: 512 → 1024
length_schedule:
  - [0, 512]
  - [150, 1024]

# Tool iterations: 5 (1-hop phase) → 10 (multi-hop phase)
tool_iter_schedule:
  - [0, 5]
  - [100, 10]

# Data is pre-sorted: 1-hop first, then 2-hop, then 3-hop

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
