# V2 single-GPU config — Blackwell 98GB
# Clean: bug-fixed TI/TO, no forced submit, no cache
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2.jsonl"

per_device_train_batch_size: 1
gradient_accumulation_steps: 2
num_generations: 4
max_completion_length: 512
max_tool_calling_iterations: 5

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

num_train_epochs: 4
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Curriculum (aligned to sorted data: 60 1-hop, 80 2-hop, 60 3-hop)
# Epoch 1: steps 0-29 (1-hop), 30-69 (2-hop), 70-99 (3-hop)
# Epochs 2-4: mixed
length_schedule:
  - [0, 512]
  - [30, 768]
  - [70, 1024]

tool_iter_schedule:
  - [0, 5]
  - [30, 7]
  - [70, 10]

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
