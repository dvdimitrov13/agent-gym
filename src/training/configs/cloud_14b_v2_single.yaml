# V2 single-GPU config — 96GB RTX PRO 6000
# No inference server — TRL handles generation + training on same GPU
# TI/TO via overridden _tool_call_loop (local, not HTTP)
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2.jsonl"

# No inference server — single GPU
# inference_server_url: not set

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 1024
max_tool_calling_iterations: 10

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

num_train_epochs: 4
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Length scheduling: 256 → 512 → 1024
length_schedule:
  - [0, 256]
  - [100, 512]
  - [200, 1024]

output_dir: "checkpoints/qwen3-14b-grpo-v2"
