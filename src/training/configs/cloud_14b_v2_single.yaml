# V2 single-GPU config — Blackwell 98GB
# Pre-built curriculum: 2 sorted epochs + 2 shuffled epochs in one dataset
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl_v2_curriculum.jsonl"

per_device_train_batch_size: 2
gradient_accumulation_steps: 2
num_generations: 4
max_completion_length: 1024
max_tool_calling_iterations: 5

# GRPO (length-biased, SID-1 style)
loss_type: "grpo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Single epoch (curriculum baked into the dataset)
num_train_epochs: 1
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# V2
use_v2_env: true
use_v2_rewards: true
use_tito: true

# Curriculum schedule (consecutive per difficulty):
#   Steps  0-29:  1-hop × 2 epochs, 512 tokens, 5 iters
#   Steps 30-69:  2-hop × 2 epochs, 768 tokens, 7 iters
#   Steps 70-99:  3-hop × 2 epochs, 1024 tokens, 10 iters
#   Steps 100-199: mixed (shuffled), 1024 tokens, 10 iters
# Flat 1024 — model needs room to think + submit
# length_schedule: none, flat 1024 throughout

tool_iter_schedule:
  - [0, 5]
  - [30, 7]
  - [70, 10]

# Output
output_dir: "checkpoints/qwen3-14b-grpo-v2"
