# Cloud training config — Qwen3-14B + LoRA via Unsloth on A6000
model_name: "unsloth/Qwen3-14B"
dataset: "data/train_trl.jsonl"

# Unsloth — handles vLLM standby + memory optimization
use_unsloth: true
gpu_memory_utilization: 0.85
max_seq_length: 4096
load_in_4bit: false

per_device_train_batch_size: 2
gradient_accumulation_steps: 4    # effective batch = 8
num_generations: 4                # must divide effective batch
max_completion_length: 512
max_tool_calling_iterations: 3

# GRPO settings
loss_type: "dapo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Training length
num_train_epochs: 3
logging_steps: 1
save_steps: 10

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Memory optimization
bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# Output
output_dir: "checkpoints/qwen3-14b-grpo"
