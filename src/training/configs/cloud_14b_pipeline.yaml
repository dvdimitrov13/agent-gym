# PipelineRL config — custom inference server on GPU 0, TRL trainer on GPU 1
# No vLLM — uses plain transformers model.generate() on the server
# Launch with: bash scripts/train_dual_env.sh
model_name: "Qwen/Qwen3-14B"
dataset: "data/train_trl.jsonl"

# Remote inference server (GPU 0)
inference_server_url: "http://localhost:8000"

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 1024
max_tool_calling_iterations: 3

# GRPO settings
loss_type: "dapo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Training length
num_train_epochs: 3
logging_steps: 1
save_steps: 50

# LoRA
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: "all-linear"

# Optimizations
bf16: true
gradient_checkpointing: true
mask_truncated_completions: false

# Filtering
zero_variance_filtering: true

# Output
output_dir: "checkpoints/qwen3-14b-grpo-pipeline"
