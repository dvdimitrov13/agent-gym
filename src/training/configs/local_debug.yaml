# Local debug config — 0.6B on MPS, just validate the pipeline runs
model_name: "Qwen/Qwen3-0.6B"
dataset: "data/train_trl.jsonl"

# Tiny batch for MPS
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
num_generations: 2
max_completion_length: 256
max_tool_calling_iterations: 3

# GRPO settings
loss_type: "dapo"
beta: 0.0
temperature: 0.7
learning_rate: 1e-5

# Short run
max_steps: 3
logging_steps: 1

# No LoRA for debug
use_lora: false

# Memory
gradient_checkpointing: true
mask_truncated_completions: true
